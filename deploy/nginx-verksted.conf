## Server config – verksted.poshub.no
##
## Cloudflare Tunnel → http://localhost:80 → nginx → enten statisk SPA
## eller proxy til uvicorn på 127.0.0.1:8000
##
## Plasser som /etc/nginx/sites-available/verksted og:
##   sudo ln -sf /etc/nginx/sites-available/verksted /etc/nginx/sites-enabled/verksted
##   sudo rm -f /etc/nginx/sites-enabled/default
##   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    server_name _;

    # Cloudflare Tunnel terminerer TLS – vi snakker rent HTTP lokalt.
    # X-Forwarded-* settes av cloudflared.

    client_max_body_size 25m;

    # Sikkerhetsheaders – backend setter også sine, men disse hjelper for statiske svar.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- API ----
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 60s;
    }

    # ---- Uploads (kvitteringer/bilder fra backend) ----
    location /uploads/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ---- Frontend (Vite-build) ----
    root /opt/gvk/frontend;
    index index.html;

    # Cache assets aggresivt; index.html aldri.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri /index.html;
        add_header Cache-Control "no-store" always;
    }
}
